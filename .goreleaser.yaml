version: 2

builds:
  - main: ./cmd/ziti-mcp-server
    binary: ziti-mcp-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/openziti/ziti-mcp-server-go/internal/version.Version={{.Version}}
      - -X github.com/openziti/ziti-mcp-server-go/internal/version.Commit={{.ShortCommit}}
      - -X github.com/openziti/ziti-mcp-server-go/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

snapshot:
  version_template: "{{ .Tag }}-next-{{ .ShortCommit }}"
